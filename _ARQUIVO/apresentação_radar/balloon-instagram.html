<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saber Idiomas - Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        @keyframes like-burst {
            0% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        
        @keyframes float-up {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }
        
        @keyframes heart-float {
            0% { opacity: 1; transform: scale(0) translateY(0); }
            50% { opacity: 1; transform: scale(1.2) translateY(-20px); }
            100% { opacity: 0; transform: scale(1) translateY(-60px); }
        }
        
        .like-animation { animation: like-burst 0.4s ease-out; }
        .float-balloon { animation: float-up 0.8s ease-out forwards; }
        .double-tap-heart { animation: heart-float 0.8s ease-out forwards; }
        
        .story-ring {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            padding: 2px;
        }
        
        .post-image { 
            cursor: pointer;
            user-select: none;
        }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-black text-white min-h-screen">

            {
                id: 10,
                username: 'saber_goods',
                avatar: 'https://ui-avatars.com/api/?name=SG&background=2563eb&color=fff&size=64',
                verified: true,
                location: 'Times de Sucesso',
                image: './Posts/11.png',
                likes: 1620,
                liked: false,
                saved: false,
                caption: 'Saber Goods: Edição Times de Sucesso! 🎁📱 Escaneie o QR Code e descubra o que preparamos para 2025. Conexões que geram resultados e brindes que todo mundo quer! #SaberGoods #TimesDeSucesso #QRCode #Novidades #AnoNovo',
                comments: 68,
                time: '2d'
            }
        ];

        // Gera SVG do balão
        function generateBalloonSVG(size, liked) {
            const color = '#FF4444';
            return `
                <svg width="${size}" height="${size}" viewBox="0 0 100 100" fill="none" class="transition-all duration-200">
                    <circle
                        cx="50" cy="45" r="38"
                        fill="${liked ? color : 'none'}"
                        stroke="${liked ? 'none' : color}"
                        stroke-width="2.5"
                    />
                    ${liked ? `
                    <ellipse
                        cx="35" cy="25" rx="10" ry="13"
                        fill="rgba(255, 255, 255, 0.35)"
                    />` : ''}
                    <circle cx="50" cy="82" r="3" fill="${color}" />
                </svg>
            `;
        }

        // Gera HTML do post
        function generatePost(post) {
            return `
                <article class="border-b border-zinc-800" data-post-id="${post.id}">
                    <!-- Header -->
                    <div class="flex items-center justify-between p-3">
                        <div class="flex items-center gap-3">
                            <div class="story-ring rounded-full p-0.5">
                                <img src="${post.avatar}" class="w-8 h-8 rounded-full">
                            </div>
                            <div>
                                <div class="flex items-center gap-1">
                                    <span class="font-semibold text-sm">${post.username}</span>
                                    ${post.verified ? `
                                    <svg class="w-4 h-4 text-blue-500" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                                    </svg>` : ''}
                                </div>
                                <span class="text-xs text-zinc-500">${post.location}</span>
                            </div>
                        </div>
                        <button class="p-2" aria-label="Mais opções">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                <circle cx="12" cy="5" r="2"/>
                                <circle cx="12" cy="12" r="2"/>
                                <circle cx="12" cy="19" r="2"/>
                            </svg>
                        </button>
                    </div>

                    <!-- Image -->
                    <div class="post-image relative overflow-hidden" onclick="handleDoubleTap(event, ${post.id})">
                        <img src="${post.image}" class="w-full h-auto" alt="Post">
                        <div id="double-tap-${post.id}" class="absolute inset-0 flex items-center justify-center pointer-events-none"></div>
                    </div>

                    <!-- Actions -->
                    <div class="flex items-center justify-between p-3">
                        <div class="flex items-center gap-4">
                            <button onclick="toggleLike(${post.id})" class="like-btn" id="like-btn-${post.id}" aria-label="Curtir">
                                ${generateBalloonSVG(28, post.liked)}
                            </button>
                            <button aria-label="Comentar">
                                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                                </svg>
                            </button>
                            <button aria-label="Compartilhar">
                                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                                </svg>
                            </button>
                        </div>
                        <button onclick="toggleSave(${post.id})" id="save-btn-${post.id}" aria-label="Salvar">
                            <svg class="w-7 h-7" fill="${post.saved ? 'white' : 'none'}" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                            </svg>
                        </button>
                    </div>

                    <!-- Likes -->
                    <div class="px-3 pb-1">
                        <span class="font-semibold text-sm" id="likes-${post.id}">${post.likes.toLocaleString()} curtidas</span>
                    </div>

                    <!-- Caption -->
                    <div class="px-3 pb-2">
                        <span class="font-semibold text-sm">${post.username}</span>
                        <span class="text-sm"> ${post.caption}</span>
                    </div>

                    <!-- Comments -->
                    <div class="px-3 pb-2">
                        <button class="text-zinc-500 text-sm">Ver todos os ${post.comments} comentários</button>
                    </div>

                    <!-- Time -->
                    <div class="px-3 pb-3">
                        <span class="text-xs text-zinc-500 uppercase">${post.time}</span>
                    </div>
                </article>
            `;
        }

        // Renderiza feed
        function renderFeed() {
            document.getElementById('feed').innerHTML = posts.map(generatePost).join('');
        }

        // Toggle like
        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            post.liked = !post.liked;
            post.likes += post.liked ? 1 : -1;

            const btn = document.getElementById(`like-btn-${postId}`);
            btn.innerHTML = generateBalloonSVG(28, post.liked);
            
            if (post.liked) {
                btn.classList.add('like-animation');
                setTimeout(() => btn.classList.remove('like-animation'), 400);
                
                // Cria balões flutuando
                createFloatingBalloons(btn);
            }

            document.getElementById(`likes-${postId}`).textContent = `${post.likes.toLocaleString()} curtidas`;
        }

        // Cria balões flutuando na animação
        function createFloatingBalloons(element) {
            const rect = element.getBoundingClientRect();
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const balloon = document.createElement('div');
                    balloon.innerHTML = generateBalloonSVG(20, true);
                    balloon.className = 'fixed pointer-events-none float-balloon';
                    balloon.style.left = `${rect.left + Math.random() * 20 - 10}px`;
                    balloon.style.top = `${rect.top}px`;
                    balloon.style.zIndex = '100';
                    document.body.appendChild(balloon);
                    setTimeout(() => balloon.remove(), 800);
                }, i * 100);
            }
        }

        // Double tap para curtir
        let lastTap = 0;
        function handleDoubleTap(event, postId) {
            const now = Date.now();
            if (now - lastTap < 300) {
                const post = posts.find(p => p.id === postId);
                if (!post.liked) {
                    toggleLike(postId);
                }
                
                // Mostra balão grande no centro
                const container = document.getElementById(`double-tap-${postId}`);
                container.innerHTML = `
                    <div class="double-tap-heart">
                        ${generateBalloonSVG(120, true)}
                    </div>
                `;
                setTimeout(() => container.innerHTML = '', 800);
            }
            lastTap = now;
        }

        // Toggle save
        function toggleSave(postId) {
            const post = posts.find(p => p.id === postId);
            post.saved = !post.saved;
            
            const btn = document.getElementById(`save-btn-${postId}`);
            btn.innerHTML = `
                <svg class="w-7 h-7" fill="${post.saved ? 'white' : 'none'}" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                </svg>
            `;
        }

        // Init
        renderFeed();
    </script>
</body>
</html>
